services:
  frontend:
    image: aldngrha/portfolio-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - VITE_API_URL=https://api.aldinugraha.me
      - BODY_SIZE_LIMIT=10485760
    networks:
      - proxy

  backend:
    image: aldngrha/portfolio-backend:latest
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PORT=8080
      - ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=72
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-portfolio}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@aldinugraha.me}
      - EMAIL_TO=${EMAIL_TO:-aldi.nugrahatk@gmail.com}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://aldinugraha.me}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - POSTGRES_USER=${POSTGRES_USER:-aldi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aldi} -d ${POSTGRES_DB:-portfolio}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy

volumes:
  pgdata:

networks:
  proxy:
    external: true
