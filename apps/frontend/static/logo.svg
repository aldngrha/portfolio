<svg width="53" height="53" viewBox="0 0 53 53" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Elemen yang berubah warna (di dalam) */
    .icon-content {
      fill: black;
      stroke: black;
    }

    /* Lingkaran luar (tetap hitam) */
    .icon-border {
      stroke: black;
    }

    /* Override warna saat Dark Mode */
    @media (prefers-color-scheme: dark) {
      .icon-content {
        fill: white;
        stroke: white;
      }
      /* Lingkaran luar tetap hitam di dark mode */
      .icon-border {
        stroke: white; /* Opsional: jika ingin lingkaran luar ikut putih, ganti ke white */
      }
    }
  </style>

  <rect class="icon-content" x="14.1106" y="12.1107" width="3.27452" height="26.4791" rx="1.63726"/>
  <rect class="icon-content" x="23.5" y="29.5" width="3" height="9" rx="1.5" transform="rotate(90 23.5 29.5)"/>
  <rect class="icon-content" x="34.8727" y="12.1107" width="3.27452" height="26.4791" rx="1.63726"/>
  <rect class="icon-content" x="13.7058" y="13.8778" width="3.27452" height="34.0956" rx="1.63726" transform="rotate(-41.5521 13.7058 13.8778)"/>

  <circle class="icon-border" cx="26.5" cy="26.5" r="24.5" stroke-width="4"/>
</svg>
